<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jukebox</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 90%; max-width: 1000px; padding: 20px; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .search-section { grid-column: 1 / -1; background: #1e1e1e; padding: 15px; border-radius: 8px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 4px; border: none; font-size: 16px; }
        button { padding: 10px 20px; background: #ff0000; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #player-container { background: #000; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; }
        .sidebar { background: #1e1e1e; padding: 15px; border-radius: 8px; height: fit-content; }
        h3 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .queue-item, .result-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 8px; background: #2a2a2a; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .queue-item:hover, .result-item:hover { background: #383838; }
        .result-item img, .queue-item img { width: 80px; border-radius: 4px; }
        .controls { margin-top: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-section">
        <input type="text" id="query" placeholder="Cerca una canzone o un video...">
        <button onclick="cercaVideo()">Cerca</button>
    </div>

    <div class="main-content">
        <div id="player-container">
            <div id="player"></div>
        </div>
        <div id="results" style="margin-top:20px;">
            <h3>Risultati Ricerca</h3>
            <!-- Risultati della ricerca appariranno qui -->
        </div>
    </div>

    <div class="sidebar">
        <h3>Coda di Riproduzione</h3>
        <div id="queue-list">
            <!-- La tua playlist di sessione -->
        </div>
        <div class="controls">
            <button onclick="playNext()" style="background: #444; width: 100%;">Salta Prossimo</button>
        </div>
    </div>
</div>

<script>
    let queue = [];
    let player;

    // 1. Carica le IFrame API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%',
            width: '100%',
            videoId: '', // Inizia vuoto
            playerVars: { 'playsinline': 1 },
            events: { 'onStateChange': onPlayerStateChange }
        });
    }

    // 2. Cerca Video 
    async function cercaVideo() {
        const q = document.getElementById('query').value;
        if (!q) return;
        
        const url = `https://www.googleapis.com{encodeURIComponent(q)}&type=video&key=AIzaSyBwZsEchAW5KOytpVE6lqRQaXYdOrsbYT0`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            mostraRisultati(data.items);
        } catch (err) {
            console.error("Errore ricerca:", err);
            alert("Errore durante la ricerca. Controlla la tua API Key.");
        }
    }

    function mostraRisultati(items) {
        const container = document.getElementById('results');
        container.innerHTML = '<h3>Risultati Ricerca</h3>';
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `
                <img src="${item.snippet.thumbnails.default.url}">
                <span>${item.snippet.title}</span>
            `;
            div.onclick = () => aggiungiACoda(item.id.videoId, item.snippet.title, item.snippet.thumbnails.default.url);
            container.appendChild(div);
        });
    }

    // 3. Gestione Coda
    function aggiungiACoda(id, titolo, thumb) {
        queue.push({ id, titolo, thumb });
        aggiornaInterfacciaCoda();
        
        // Se non sta riproducendo nulla, avvia il primo
        if (player.getPlayerState() !== 1 && queue.length === 1) {
            playVideo(id);
        }
    }

    function aggiornaInterfacciaCoda() {
        const list = document.getElementById('queue-list');
        list.innerHTML = '';
        queue.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'queue-item';
            div.innerHTML = `
                <img src="${item.thumb}">
                <div>
                    <strong>#${index + 1}</strong><br>
                    ${item.titolo}
                </div>
            `;
            div.onclick = () => {
                // Rimuovi o sposta volendo, qui lo facciamo solo riprodurre
                playVideo(item.id);
                queue.splice(index, 1);
                aggiornaInterfacciaCoda();
            };
            list.appendChild(div);
        });
    }

    function playVideo(id) {
        player.loadVideoById(id);
    }

    // 4. Passaggio automatico al prossimo video
    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            playNext();
        }
    }

    function playNext() {
        if (queue.length > 0) {
            const next = queue.shift();
            playVideo(next.id);
            aggiornaInterfacciaCoda();
        }
    }
</script>

</body>
</html>
