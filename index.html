<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Mia App Samsung-Style</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER / TOP BAR -->
  <header class="app-header">
    <h1 class="app-title">La Mia App</h1>
    <button class="btn-menu" data-action="toggle-menu">☰</button>
  </header>

  <!-- MAIN CONTENT AREA -->
  <main class="app-main">

    <!-- LIBRERIA / LISTA CONTENUTI -->
    <section class="library-screen" data-ui="library">
      <h2>La Mia Libreria</h2>
      <ul class="library-list">
        <!-- Gli elementi saranno popolati via JS -->
      </ul>
    </section>

    <!-- SCHERMATA ESPANSA / DETTAGLIO -->
    <section class="expanded-screen" data-ui="expanded">
      <button class="btn-back" data-action="close-expanded">← Indietro</button>
      <div class="expanded-content">
        <!-- Contenuto dinamico -->
      </div>
    </section>

  </main>

  <!-- MENU / CONTROLLI LATERALI -->
  <aside class="side-menu" data-ui="menu">
    <nav>
      <ul>
        <li><button data-action="go-home">Home</button></li>
        <li><button data-action="open-settings">Impostazioni</button></li>
        <li><button data-action="logout">Logout</button></li>
      </ul>
    </nav>
  </aside>

  <!-- SCRIPTS -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
