<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grugofy</title>
    <style>
        :root {
            --primary: #1db954;
            --bg: #0f0f0f;
            --card: #1e1e1e;
            --text: #ffffff;
            --text-dim: #b3b3b3;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        header {
            padding: 30px 15px 15px;
            background: linear-gradient(to bottom, #282828, var(--bg));
            display: flex; align-items: center; gap: 10px;
            z-index: 10;
        }

        .custom-file-upload {
            background: var(--primary);
            color: black;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid var(--primary);
            font-weight: bold;
            font-size: 0.8rem;
            white-space: nowrap;
            cursor: pointer;
            flex-shrink: 0;
        }

        input[type="file"] { display: none; }

        #search-input {
            flex-grow: 1;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid var(--primary);
            background: #222;
            color: #fff;
            outline: none;
            font-size: 0.9rem;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 220px;
        }

        .section-title {
            font-size: 0.8rem; margin: 20px 0 10px;
            color: var(--primary); text-transform: uppercase; letter-spacing: 1px;
        }

        #queue-list > div, #saved-playlists-list > div {
            display: flex; align-items: center; 
            padding: 12px; background: #1a1a1a; 
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 0;
        }

        #queue-list > div:first-child, #saved-playlists-list > div:first-child {
            border-radius: 15px 15px 0 0;
        }

        #queue-list > div:last-child, #saved-playlists-list > div:last-child {
            border-radius: 0 0 15px 15px;
            border-bottom: none;
            margin-bottom: 15px;
        }

        #queue-list > div:first-child:last-child, #saved-playlists-list > div:first-child:last-child {
            border-radius: 15px;
        }

        .folder-group { background: var(--card); border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .folder-name { background: #2a2a2a; padding: 10px 15px; font-weight: bold; font-size: 0.75rem; color: var(--primary); cursor: pointer; }

        .track-item {
            display: flex; align-items: center; padding: 10px 15px;
            gap: 12px; border-bottom: 1px solid #2a2a2a;
            background: var(--card); transition: transform 0.2s ease;
            position: relative;
        }

        #library .track-item.playing { 
            border-left: 5px solid var(--primary) !important; 
            background: #252525 !important; 
        }

        #library .track-item.last-pos { 
            border-left: 5px solid #4a9e6a !important;
            background: #1c2a22 !important;
        }

        .track-cover {
            width: 45px; height: 45px;
            border-radius: 6px; background: #333;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; overflow: hidden;
        }
        .track-cover img { width: 100%; height: 100%; object-fit: cover; }

        .track-info { flex: 1; min-width: 0; cursor: pointer; }
        .track-name { 
            display: block; white-space: nowrap; overflow: hidden; 
            text-overflow: ellipsis; font-size: 0.9rem; font-weight: bold;
        }

        .track-meta-row {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.7rem; color: var(--text-dim); margin-top: 2px;
        }

        .file-format {
            text-transform: uppercase; font-weight: bold;
            color: #888; background: rgba(255,255,255,0.05);
            padding: 1px 4px; border-radius: 3px;
        }

        /* Badge YT con colore rosso */
        .file-format.yt-badge {
            color: #fff;
            background: rgba(255, 0, 0, 0.25);
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        #player-bar {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(18, 18, 18, 0.98); backdrop-filter: blur(15px);
            border-top: 1px solid #333; padding: 15px; z-index: 1100;
        }

        .progress-container { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        input[type="range"] { flex: 1; accent-color: var(--primary); height: 4px; cursor: pointer; }
        .time-label { font-size: 0.7rem; min-width: 35px; color: var(--text-dim); font-family: monospace; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 25px; }
        .ctrl-btn {
            width: 50px; height: 50px; border: none;
            background: transparent;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: white;
        }
        .btn-main { 
            width: 65px !important; 
            height: 65px !important; 
            min-width: 65px !important;
            min-height: 65px !important;
            background: #fff; 
            color: #000; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-loop-indicator { border-radius: 10px; width: 45px; height: 45px; }

        #expanded-player {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; 
            transition: top 0.3s ease;
            display: flex; flex-direction: column;
            touch-action: none;
        }

        .close-indicator {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            opacity: 0.3;
            cursor: pointer; pointer-events: auto;
            z-index: 1005; padding: 20px;
        }

        #expanded-player.open { top: 0; }

        #visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: relative;
        }

        #visual-container video, #visual-container img {
            max-width: 100%; max-height: 80vh; pointer-events: none;
        }

        /* Skeleton loader per YT */
        .yt-skeleton {
            background: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .yt-skeleton-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 15px; border-bottom: 1px solid #2a2a2a;
        }
        .yt-skeleton-item:last-child { border-bottom: none; }
        .skel-cover {
            width: 45px; height: 45px; border-radius: 6px;
            background: linear-gradient(90deg, #2a2a2a 25%, #333 50%, #2a2a2a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            flex-shrink: 0;
        }
        .skel-info { flex: 1; }
        .skel-line {
            height: 10px; border-radius: 5px;
            background: linear-gradient(90deg, #2a2a2a 25%, #333 50%, #2a2a2a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            margin-bottom: 6px;
        }
        .skel-line.short { width: 55%; }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
</head>
<body>

<header>
    <label class="custom-file-upload">
        <input id="folderInput" type="file" webkitdirectory multiple accept="audio/*, video/*">
        CARICA
    </label>
    <input type="text" id="search-input" placeholder="Cerca brano...">
</header>

<main id="content">
    <div id="queue-section" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div class="section-title" style="margin:0">In Coda</div>
            <button id="save-playlist-btn" style="background:var(--primary); border:none; border-radius:20px; padding:5px 12px; font-weight:bold; font-size:0.7rem; cursor:pointer;">SALVA CODA</button>
        </div>
        <div id="queue-list"></div>
    </div>

    <div id="playlist-manager">
       <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div class="section-title" style="margin:0">Playlist Salvate</div>
            <button id="save-history-btn" style="background:var(--primary); border:none; border-radius:20px; padding:5px 12px; font-weight:bold; font-size:0.7rem; cursor:pointer;">SALVA CRONOLOGIA</button>
       </div>
       <div id="saved-playlists-list"></div>
    </div>
    
    <div id="yt-section" style="display:none;">
        <div class="section-title">YouTube</div>
        <div id="youtube-results"></div>
    </div>
    
    <div class="section-title">Libreria</div>
    <div id="library"></div>
</main>

<div id="player-bar">
    <div id="now-playing-title" style="text-align:center; font-weight:bold; margin-bottom:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:0.9rem;">Seleziona un brano</div>
    
    <div class="progress-container">
        <span class="time-label" id="time-current">0:00</span>
        <input type="range" id="seek-slider" value="0" max="100">
        <span class="time-label" id="time-total">0:00</span>
    </div>

    <div class="controls">
        <div class="ctrl-btn btn-loop-indicator" id="btn-shuffle"></div>
        <div class="ctrl-btn" id="btn-prev"></div>
        <div class="ctrl-btn btn-main" id="btn-play"></div>
        <div class="ctrl-btn" id="btn-next"></div>
        <div class="ctrl-btn btn-loop-indicator" id="btn-loop"></div>
    </div>
</div>

<video id="main-audio" style="display:none;"></video>

<div id="yt-player" style="position:absolute; width:1px; height:1px; opacity:0; pointer-events:none;"></div>
<script src="https://www.youtube.com/iframe_api"></script>

<div id="expanded-player">
    <div class="close-indicator">
        <div style="width:20px; height:4px; background:#fff; border-radius:2px; transform: rotate(10deg) translateX(4px); display:inline-block;"></div>
        <div style="width:20px; height:4px; background:#fff; border-radius:2px; transform: rotate(-10deg) translateX(-4px); display:inline-block;"></div>
    </div>
    <div id="visual-container"></div>
</div>





    <script>
const YT_API_KEY = 'AIzaSyBwZsEchAW5KOytpVE6lqRQaXYdOrsbYT0';

// REFS
const audio = document.getElementById('main-audio');
const input = document.getElementById('folderInput');
const libraryEl = document.getElementById('library');
const queueListEl = document.getElementById('queue-list');
const nowPlayingTitle = document.getElementById('now-playing-title');
const playBtn = document.getElementById('btn-play');
const seekSlider = document.getElementById('seek-slider');
const timeCurrent = document.getElementById('time-current');
const timeTotal = document.getElementById('time-total');

// STATE
let playlist = [];
let queue = [];
let currentPlayingIdx = -1;
let lastManualLibraryIdx = -1;
let isLooping = false;
let isShuffle = false;
let shuffleOrder = [];
let playHistory = [];
let startTime = null;

let ytPlayer = null;
let ytReady = false;
let ytPendingVideoId = null;
let currentYTId = null;
let currentItem = null;

let ytProgressInterval = null;

// YT INIT
function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('yt-player', {
        height: '1',
        width: '1',
        videoId: '',
        playerVars: { playsinline: 1 },
        events: {
            onReady: () => {
                ytReady = true;
                if (ytPendingVideoId) {
                    ytPlayer.loadVideoById(ytPendingVideoId);
                    ytPendingVideoId = null;
                }
            },
            onStateChange: onYTStateChange
        }
    });
}

function onYTStateChange(e) {
    if (e.data === YT.PlayerState.ENDED) {
        stopYTProgress();
        document.getElementById('btn-next').click();
    }

    if (e.data === YT.PlayerState.PLAYING) {
        startYTProgress();
    } else {
        stopYTProgress();
    }

    updateUI();
}

// YT PROGRESS
function startYTProgress() {
    stopYTProgress();

    ytProgressInterval = setInterval(() => {
        if (!ytPlayer) return;

        const current = ytPlayer.getCurrentTime();
        const duration = ytPlayer.getDuration();

        if (!duration) return;

        seekSlider.value = (current / duration) * 100;
        timeCurrent.textContent = formatTime(current);
        timeTotal.textContent = formatTime(duration);
    }, 500);
}

function stopYTProgress() {
    if (ytProgressInterval) {
        clearInterval(ytProgressInterval);
        ytProgressInterval = null;
    }
}

// PLAY ITEM (FIX COMPLETO)
function playItem(item) {
    currentItem = item;

    if (item.type === 'youtube') {
        audio.pause();
        currentYTId = item.id;

        nowPlayingTitle.textContent = item.title;

        if (ytReady) ytPlayer.loadVideoById(item.id);
        else ytPendingVideoId = item.id;

        // MEDIA SESSION COMPLETA
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: item.title,
                artist: item.uploader || 'YouTube',
                artwork: [{ src: item.thumb || '' }]
            });

            navigator.mediaSession.setActionHandler('play', () => ytPlayer.playVideo());
            navigator.mediaSession.setActionHandler('pause', () => ytPlayer.pauseVideo());
            navigator.mediaSession.setActionHandler('previoustrack', () => document.getElementById('btn-prev').click());
            navigator.mediaSession.setActionHandler('nexttrack', () => document.getElementById('btn-next').click());
        }

        updateUI();
        return;
    }

    // FILE LOCALE
    currentYTId = null;
    const idx = playlist.indexOf(item);
    playTrack(idx);
}

// PLAY TRACK
function playTrack(idx, fromQueue = false, isBack = false) {
    if (idx < 0 || idx >= playlist.length) return;

    currentPlayingIdx = idx;
    const track = playlist[idx];

    audio.src = URL.createObjectURL(track.file);
    audio.play();

    nowPlayingTitle.textContent = track.file.name.replace(/\.[^/.]+$/, '');

    updateUI();
    updateExpandedView();
}

// CONTROLS
playBtn.onclick = () => {
    if (currentYTId && ytPlayer) {
        const state = ytPlayer.getPlayerState();
        if (state === YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
        else ytPlayer.playVideo();
        return;
    }

    audio.paused ? audio.play() : audio.pause();
};

document.getElementById('btn-next').onclick = () => {
    if (queue.length) {
        playItem(queue.shift());
        renderQueue();
        return;
    }

    if (currentPlayingIdx < playlist.length - 1) {
        playTrack(currentPlayingIdx + 1);
    }
};

document.getElementById('btn-prev').onclick = () => {
    if (audio.currentTime > 3) {
        audio.currentTime = 0;
        return;
    }

    if (playHistory.length) {
        playTrack(playHistory.pop());
    }
};

// SEEK
seekSlider.oninput = () => {
    if (currentYTId && ytPlayer) {
        const d = ytPlayer.getDuration();
        ytPlayer.seekTo((seekSlider.value / 100) * d, true);
    } else {
        audio.currentTime = (seekSlider.value / 100) * audio.duration;
    }
};

// AUDIO EVENTS
audio.ontimeupdate = () => {
    seekSlider.value = (audio.currentTime / audio.duration) * 100 || 0;
    timeCurrent.textContent = formatTime(audio.currentTime);
    if (audio.duration) timeTotal.textContent = formatTime(audio.duration);
};

audio.onended = () => {
    if (isLooping) {
        audio.currentTime = 0;
        audio.play();
    } else {
        document.getElementById('btn-next').click();
    }
};

// UI
function updateUI() {
    let isPlaying = false;

    if (currentYTId && ytPlayer) {
        isPlaying = ytPlayer.getPlayerState() === YT.PlayerState.PLAYING;
    } else {
        isPlaying = !audio.paused;
    }

    playBtn.innerHTML = isPlaying ? '⏸' : '▶';
}

// EXPANDED PLAYER (FIX TOTALE)
function updateExpandedView() {
    const container = document.getElementById('visual-container');
    if (!container) return;

    container.innerHTML = '';

    // YOUTUBE
    if (currentYTId && ytPlayer) {
        const iframe = ytPlayer.getIframe();
        iframe.style.width = '100%';
        iframe.style.height = '60vh';
        iframe.style.borderRadius = '12px';
        container.appendChild(iframe);
        return;
    }

    // FILE LOCALE
    if (currentPlayingIdx !== -1) {
        const track = playlist[currentPlayingIdx];

        if (track.file.type.startsWith('video/')) {
            container.appendChild(audio);
            audio.style.display = 'block';
        } else {
            const img = document.createElement('img');
            img.src = track.cover || 'https://placehold.co/512x512';
            img.style.width = '85%';
            img.style.borderRadius = '15px';
            container.appendChild(img);
        }
    }
}

// TOGGLE PLAYER (FIX GLOBALE)
window.togglePlayer = (open) => {
    const p = document.getElementById('expanded-player');

    if (open) {
        updateExpandedView();
        p.classList.add('open');
    } else {
        p.classList.remove('open');
    }
};

document.getElementById('now-playing-title').onclick = () => togglePlayer(true);

// QUEUE
function renderQueue() {
    queueListEl.innerHTML = '';
    document.getElementById('queue-section').style.display = queue.length ? 'block' : 'none';

    queue.forEach((t, i) => {
        const div = document.createElement('div');
        div.innerHTML = `<div style="flex:1">${t.title || t.file?.name}</div>`;
        queueListEl.appendChild(div);
    });
}

// HELPERS
function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return isNaN(s) ? '0:00' : `${m}:${sec}`;
}

// INIT
window.onload = () => {
    updateUI();
};
</script>

    

</body>
</html>
