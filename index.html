<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Grugofy</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
</head>
<body>

<header>
  <label class="btn-upload">
    <!-- Nessun webkitdirectory: accetta file singoli (audio, video, txt) e cartelle via JS -->
    <input id="folderInput" type="file" multiple accept="audio/*,video/*,.txt,text/plain">
    +
  </label>
  <div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="Cerca brano…" autocomplete="off">
    <button id="clearSearchBtn">✕</button>
  </div>
</header>

<main id="mainContent">

  <section id="queueSection" hidden>
    <div class="section-header">
      <span class="section-title" id="queueSectionTitle" style="cursor:pointer;user-select:none;">CODA</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <button id="clearQueueBtn"  class="pill-btn pill-btn--danger" aria-label="Svuota coda">✕</button>
        <button id="saveQueueBtn"   class="pill-btn">SALVA CODA</button>
      </div>
    </div>
    <div id="queueList" data-collapsible-body></div>
  </section>

  <section id="playlistSection">
    <div class="section-header">
      <span class="section-title" style="cursor:pointer;user-select:none;">PLAYLIST SALVATE</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <button id="exportAllPlaylistsBtn" class="pill-btn pill-btn--blue" aria-label="Scarica tutte le playlist">
          <!-- Freccia grossa azzurra -->
          <svg viewBox="0 0 20 20" width="14" height="14" aria-hidden="true" style="vertical-align:middle;">
            <path fill="#4fc3f7" d="M10 13L4 7h4V2h4v5h4l-6 6z"/>
            <rect fill="#4fc3f7" x="3" y="15" width="14" height="2" rx="1"/>
          </svg>
        </button>
        <button id="saveHistoryBtn" class="pill-btn">SALVA CRONOLOGIA</button>
      </div>
    </div>
    <div id="playlistList" data-collapsible-body></div>
  </section>

  <span class="section-title" id="libraryTitle" style="cursor:pointer;user-select:none;">LIBRERIA</span>
  <div id="library"></div>

</main>

<!-- Player bar fissa -->
<div id="playerBar">
  <div id="nowPlayingTitle">Seleziona un brano</div>

  <div class="progress-row">
    <span class="time-label" id="timeCurrent">0:00</span>
    <input type="range" id="seekSlider" value="0" max="100">
    <span class="time-label" id="timeTotal">0:00</span>
  </div>

  <div class="controls">
    <button class="ctrl-btn icon-btn" id="btnShuffle" aria-label="Shuffle"></button>
    <button class="ctrl-btn icon-btn" id="btnPrev"    aria-label="Precedente"></button>
    <button class="ctrl-btn btn-play" id="btnPlay"    aria-label="Play/Pausa"></button>
    <button class="ctrl-btn icon-btn" id="btnNext"    aria-label="Successivo"></button>
    <button class="ctrl-btn icon-btn" id="btnLoop"    aria-label="Loop"></button>
  </div>
</div>

<!-- Elemento audio/video nascosto -->
<video id="mediaEl" playsinline style="display:none"></video>

<!-- Player espanso -->
<div id="expandedPlayer">
  <div id="visualContainer"></div>
  <div id="ytWrapper">
    <div id="ytPlayerEl"></div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
