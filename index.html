<!DOCTYPE html>
<html>
<body>
    <button onclick="testAPI()">TESTA API YOUTUBE</button>
    <pre id="log" style="background: #eee; padding: 20px; margin-top: 20px;">I risultati appariranno qui...</pre>

    <script>
        async function testAPI() {
            const API_KEY = 'METTI_LA_TUA_CHIAVE_QUI'; // <--- TUA CHIAVE QUI
            const logElement = document.getElementById('log');
            
            // URL ultra-semplice per cercare "Danza Kuduro"
            const url = "https://www.googleapis.com" + API_KEY;

            logElement.innerText = "Chiamata in corso...";

            try {
                const res = await fetch(url);
                const data = await res.json();

                if (data.error) {
                    // Se Google risponde con un errore (es. chiave non abilitata)
                    logElement.style.color = "red";
                    logElement.innerText = "ERRORE GOOGLE:\n" + JSON.stringify(data.error, null, 2);
                } else if (data.items) {
                    // Se la chiave funziona e restituisce video
                    logElement.style.color = "green";
                    logElement.innerText = "SUCCESSO! Trovati " + data.items.length + " video.\n\nEsempio primo titolo: " + data.items[0].snippet.title;
                }
            } catch (err) {
                // Se il browser blocca la chiamata (es. sei in locale senza HTTPS)
                logElement.style.color = "orange";
                logElement.innerText = "ERRORE BROWSER (FETCH FAILED):\n" + err.message + "\n\nProbabile blocco CORS o mancanza di HTTPS.";
            }
        }
    </script>
</body>
</html>
