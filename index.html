<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grugofy</title>
    
    
    <link rel="stylesheet" href="style.css">
    
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
</head>
<body>

<header>
    <label class="custom-file-upload">
        <input id="folderInput" type="file" webkitdirectory multiple accept="audio/*, video/*">
        CARICA
    </label>
    <input type="text" id="search-input" placeholder="Cerca brano...">
</header>

<main id="content">
    <div id="queue-section" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div class="section-title" style="margin:0">In Coda</div>
            <button id="save-playlist-btn" style="background:var(--primary); border:none; border-radius:20px; padding:5px 12px; font-weight:bold; font-size:0.7rem; cursor:pointer;">SALVA CODA</button>
        </div>
        <div id="queue-list"></div>
    </div>

    <div id="playlist-manager">
       <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div class="section-title" style="margin:0">Playlist Salvate</div>
            <button id="save-history-btn" style="background:var(--primary); border:none; border-radius:20px; padding:5px 12px; font-weight:bold; font-size:0.7rem; cursor:pointer;">SALVA CRONOLOGIA</button>
       </div>
       <div id="saved-playlists-list"></div>
    </div>
    
    <div id="yt-section" style="display:none;">
        <div class="section-title">YouTube</div>
        <div id="youtube-results"></div>
    </div>
    
    <div class="section-title">Libreria</div>
    <div id="library"></div>
</main>

<div id="player-bar">
    <div id="now-playing-title" style="text-align:center; font-weight:bold; margin-bottom:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:0.9rem;">Seleziona un brano</div>
    
    <div class="progress-container">
        <span class="time-label" id="time-current">0:00</span>
        <input type="range" id="seek-slider" value="0" max="100">
        <span class="time-label" id="time-total">0:00</span>
    </div>

    <div class="controls">
        <div class="ctrl-btn btn-loop-indicator" id="btn-shuffle"></div>
        <div class="ctrl-btn" id="btn-prev"></div>
        <div class="ctrl-btn btn-main" id="btn-play"></div>
        <div class="ctrl-btn" id="btn-next"></div>
        <div class="ctrl-btn btn-loop-indicator" id="btn-loop"></div>
    </div>
</div>

<video id="main-audio" style="display:none;"></video>

<div id="yt-player" style="position:absolute; width:1px; height:1px; opacity:0; pointer-events:none;"></div>
<script src="https://www.youtube.com/iframe_api"></script>

<div id="expanded-player">
    <div class="close-indicator">
        <div style="width:20px; height:4px; background:#fff; border-radius:2px; transform: rotate(10deg) translateX(4px); display:inline-block;"></div>
        <div style="width:20px; height:4px; background:#fff; border-radius:2px; transform: rotate(-10deg) translateX(-4px); display:inline-block;"></div>
    </div>
    <div id="visual-container"></div>
</div>





    <script>
const YT_API_KEY = 'AIzaSyBwZsEchAW5KOytpVE6lqRQaXYdOrsbYT0';
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const YT_API_KEY = 'AIzaSyBwZsEchAW5KOytpVE6lqRQaXYdOrsbYT0';


// ─── STATE ────────────────────────────────────────────────────────────────────
// Tutte le variabili mutabili condivise tra i moduli.
// Modificare sempre tramite i setter per mantenere la coerenza.

let playlist            = [];
let queue               = [];
let currentPlayingIdx   = -1;
let lastManualLibraryIdx = -1;
let isLooping           = false;
let isShuffle           = false;
let shuffleOrder        = [];
let playHistory         = [];
let startTime           = null;

let ytPlayer            = null;
let ytReady             = false;
let ytPendingVideoId    = null;
let currentYTId         = null;

window.ytResults        = [];


// ─── DRAW ─────────────────────────────────────────────────────────────────────
// Icone costruite come stringhe HTML inline (no dipendenze esterne).

const DRAW = {
        play: '<div style="width:0; height:0; border-left:18px solid #000; border-top:12px solid transparent; border-bottom:12px solid transparent; margin-left:5px;"></div>',
        pause: '<div style="display:flex; gap:6px;"><div style="width:6px; height:22px; background:#000; border-radius:2px;"></div><div style="width:6px; height:22px; background:#000; border-radius:2px;"></div></div>',
        next: '<div style="display:flex; align-items:center;"><div style="width:0; height:0; border-left:12px solid #fff; border-top:8px solid transparent; border-bottom:8px solid transparent;"></div><div style="width:3px; height:16px; background:#fff; border-radius:1px;"></div></div>',
        prev: '<div style="display:flex; align-items:center;"><div style="width:3px; height:16px; background:#fff; border-radius:1px;"></div><div style="width:0; height:0; border-right:12px solid #fff; border-top:8px solid transparent; border-bottom:8px solid transparent;"></div></div>',
        loop: (active) => `<div style="width:20px; height:14px; border:2px solid ${active ? '#1db954' : '#888'}; border-radius:4px; position:relative;"><div style="position:absolute; top:-5px; right:5px; width:5; height:9; border-left:6px solid ${active ? '#1db954' : '#888'}; border-top:3px solid transparent; border-bottom:3px solid transparent; transform:rotate(-180deg);"></div></div>`,
        shuffle: (active) => `<div style="width:24px; height:18px; position:relative; display:flex; align-items:center;">  <!-- Linea Superiore (da sinistra a destra-giù) --><div style="position:absolute; width:100%; height:100%;">    <svg viewBox="0 0 24 18" style="fill:none; stroke:${active ? '#1db954' : '#888'}; stroke-width:2; stroke-linecap:round;">      <path d="M2,14 L6,14 C9,14 11,4 14,4 L20,4" />      <path d="M2,4 L6,4 C9,4 11,14 14,14 L20,14" />    </svg>    <!-- Punta freccia superiore -->   <div style="position:absolute; top:1px; right:0; width:0; height:0; border-left:5px solid ${active ? '#1db954' : '#888'}; border-top:3px solid transparent; border-bottom:3px solid transparent;"></div>    <!-- Punta freccia inferiore -->    <div style="position:absolute; bottom:1px; right:0; width:0; height:0; border-left:5px solid ${active ? '#1db954' : '#888'}; border-top:3px solid transparent; border-bottom:3px solid transparent;"></div>  </div></div>`,
        up: '<div style="width:0; height:0; border-left:7px solid transparent; border-right:7px solid transparent; border-bottom:10px solid #1db954;"></div>',
        down: '<div style="width:0; height:0; border-left:7px solid transparent; border-right:7px solid transparent; border-top:10px solid #1db954;"></div>',
        x: '<div style="position:relative; width:16px; height:16px;"><div style="position:absolute; top:7px; left:0; width:16px; height:2px; background:#ff4444; transform:rotate(45deg);"></div><div style="position:absolute; top:7px; left:0; width:16px; height:2px; background:#ff4444; transform:rotate(-45deg);"></div></div>'
    };



// ─── UTILS ────────────────────────────────────────────────────────────────────

function formatTime(s) {
    const m = Math.floor(s / 60), sec = Math.floor(s % 60).toString().padStart(2, '0');
    return isNaN(s) ? '0:00' : `${m}:${sec}`;
}

function escapeHtml(str) {
    return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function showToast(m) {
    const t = document.createElement('div');
    t.style.cssText = `position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:12px 25px;border-radius:30px;font-size:0.9rem;font-weight:bold;border:1px solid var(--primary);z-index:2000;pointer-events:none;transition:opacity 0.3s ease;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.5);`;
    t.textContent = m;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 800);
}

/** Converte durata ISO 8601 (PT4M13S) → secondi */
function parseISO8601Duration(str) {
    if (!str) return 0;
    const m = str.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
    if (!m) return 0;
    return (parseInt(m[1] || 0) * 3600) + (parseInt(m[2] || 0) * 60) + parseInt(m[3] || 0);
}





// ─── UI ───────────────────────────────────────────────────────────────────────
// Dipende da: state.js, draw.js

function updateUI() {
    const audio   = document.getElementById('main-audio');
    const playBtn = document.getElementById('btn-play');

    let isYTPlaying = false;
    if (ytReady && ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
        isYTPlaying = ytPlayer.getPlayerState() === YT.PlayerState.PLAYING;
    }
    const isPlaying = isYTPlaying || !audio.paused;
    playBtn.innerHTML = isPlaying ? DRAW.pause : DRAW.play;

    document.getElementById('btn-next').innerHTML    = DRAW.next;
    document.getElementById('btn-prev').innerHTML    = DRAW.prev;
    document.getElementById('btn-loop').innerHTML    = DRAW.loop(isLooping);
    document.getElementById('btn-shuffle').innerHTML = DRAW.shuffle(isShuffle);

    document.querySelectorAll('#library .track-item').forEach(el => {
        const i = parseInt(el.dataset.idx);
        el.classList.remove('playing', 'last-pos');
        if (i === currentPlayingIdx)      el.classList.add('playing');
        else if (i === lastManualLibraryIdx) el.classList.add('last-pos');
    });
}




// ─── EXPANDED PLAYER ─────────────────────────────────────────────────────────
// Dipende da: state.js, utils.js

let lastTap = 0;

function setupExpandedSwipe() {
    const el       = document.getElementById('expanded-player');
    const vContainer = document.getElementById('visual-container');
    const closeBtn = document.querySelector('.close-indicator');
    if (!el) return;

    let sX = 0, sY = 0;
    const threshold = 60;

    closeBtn.onclick = (e) => { e.stopPropagation(); togglePlayer(false); };

    vContainer.onclick = (e) => {
        const audio  = document.getElementById('main-audio');
        const now    = Date.now(), DELAY = 300;
        const rect   = vContainer.getBoundingClientRect();
        const x      = e.clientX - rect.left;
        const width  = rect.width;

        if (now - lastTap < DELAY) {
            if      (x > width * 2 / 3) { audio.currentTime = Math.min(audio.duration, audio.currentTime + 10); showToast('+10s ⏩'); }
            else if (x < width / 3)     { audio.currentTime = Math.max(0, audio.currentTime - 5);               showToast('⏪ -5s');  }
            lastTap = 0;
        } else {
            lastTap = now;
            setTimeout(() => {
                if (Date.now() - lastTap >= DELAY && lastTap !== 0)
                    audio.paused ? audio.play() : audio.pause();
            }, DELAY);
        }
    };

    el.addEventListener('touchstart', e => {
        sX = e.touches[0].clientX; sY = e.touches[0].clientY;
    }, { passive: true });

    el.addEventListener('touchend', e => {
        let dX = e.changedTouches[0].clientX - sX;
        let dY = e.changedTouches[0].clientY - sY;
        if (Math.abs(dY) > Math.abs(dX) && dY > threshold) {
            togglePlayer(false);
        } else if (Math.abs(dX) > Math.abs(dY)) {
            if      (dX >  threshold) document.getElementById('btn-prev').click();
            else if (dX < -threshold) document.getElementById('btn-next').click();
        }
    }, { passive: true });
}

function updateExpandedView(idx) {
    const audio      = document.getElementById('main-audio');
    const vContainer = document.getElementById('visual-container');
    if (!vContainer || idx === -1) return;

    const track = playlist[idx];
    vContainer.innerHTML = '';

    if (track.file.type.startsWith('video/')) {
        vContainer.appendChild(audio);
        audio.style.display   = 'block';
        audio.style.width     = '100%';
        audio.style.maxHeight = '100%';
    } else {
        const img        = document.createElement('img');
        img.src          = track.cover || 'https://placehold.co/512x512';
        img.style.width  = '85%';
        img.style.borderRadius = '15px';
        vContainer.appendChild(img);
        document.body.appendChild(audio);
        audio.style.display = 'none';
    }
}

window.togglePlayer = (open) => {
    const p = document.getElementById('expanded-player');
    if (!p) return;
    if (open && currentPlayingIdx !== -1) {
        updateExpandedView(currentPlayingIdx);
        p.classList.add('open');
    } else {
        p.classList.remove('open');
    }
};




// ─── QUEUE & PLAYLISTS ────────────────────────────────────────────────────────
// Dipende da: state.js, draw.js, utils.js

const queueListEl = document.getElementById('queue-list');

// ── Coda ──────────────────────────────────────────────────────────────────────
function renderQueue() {
    queueListEl.innerHTML = '';
    document.getElementById('queue-section').style.display = queue.length ? 'block' : 'none';

    queue.forEach((t, i) => {
        const item  = document.createElement('div');
        const title = t.type === 'youtube' ? t.title : t.file.name;
        item.innerHTML = `
            <div style="flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:0.85rem;">${escapeHtml(title)}</div>
            <div style="display:flex;gap:12px;margin-left:10px;align-items:center;">
                <div onclick="moveQ(${i},-1)">${i > 0 ? DRAW.up : ''}</div>
                <div onclick="moveQ(${i}, 1)">${i < queue.length - 1 ? DRAW.down : ''}</div>
                <div onclick="remQ(${i})">${DRAW.x}</div>
            </div>`;
        queueListEl.appendChild(item);
    });
}

window.moveQ = (i, d) => { [queue[i], queue[i + d]] = [queue[i + d], queue[i]]; renderQueue(); };
window.remQ  = (i)    => { queue.splice(i, 1); renderQueue(); };

// ── Playlist salvate ──────────────────────────────────────────────────────────
function renderPlaylists() {
    const listEl = document.getElementById('saved-playlists-list');
    const all    = JSON.parse(localStorage.getItem('f_p') || '{}');
    listEl.innerHTML = '';

    Object.keys(all).forEach(name => {
        const div = document.createElement('div');
        div.innerHTML = `
            <div style="flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:0.85rem;">${escapeHtml(name)}</div>
            <div style="display:flex;gap:12px;margin-left:10px;align-items:center;">
                <div onclick="loadP('${name}')" style="color:var(--primary);font-weight:bold;font-size:0.7rem;cursor:pointer;">CARICA</div>
                <div onclick="delP('${name}')">${DRAW.x}</div>
            </div>`;
        listEl.appendChild(div);
    });
}

window.loadP = (n) => {
    const all = JSON.parse(localStorage.getItem('f_p'));
    all[n].forEach(s => {
        if (s.yt) {
            queue.push({
                type: 'youtube', id: s.id, title: s.title,
                thumb: 'https://img.youtube.com/vi/' + s.id + '/mqdefault.jpg'
            });
        } else {
            const m = playlist.find(x => x.file.name === s.n && x.folder === s.f);
            if (m) queue.push(m);
        }
    });
    renderQueue(); showToast('Caricata!');
};

window.delP = (n) => {
    if (confirm('Elimina?')) {
        const all = JSON.parse(localStorage.getItem('f_p'));
        delete all[n];
        localStorage.setItem('f_p', JSON.stringify(all));
        renderPlaylists();
    }
};

// ── Salva coda come playlist ──────────────────────────────────────────────────
document.getElementById('save-playlist-btn').onclick = () => {
    const n = prompt('Nome Playlist:', 'Playlist ' + new Date().toLocaleDateString());
    if (!n || !queue.length) return;
    const all = JSON.parse(localStorage.getItem('f_p') || '{}');
    all[n] = queue.map(x => x.type === 'youtube'
        ? { yt: true, id: x.id, title: x.title, thumb: x.thumb }
        : { n: x.file.name, f: x.folder });
    localStorage.setItem('f_p', JSON.stringify(all));
    renderPlaylists();
};

// ── Salva cronologia ──────────────────────────────────────────────────────────
document.getElementById('save-history-btn').onclick = () => {
    if (!playHistory.length || !startTime) return showToast('Vuota!');
    const now    = new Date();
    const startH = startTime.getHours();
    const startM = startTime.getMinutes().toString().padStart(2, '0');
    const diffDays = Math.floor((now - startTime) / (1000 * 60 * 60 * 24));
    const endH   = now.getHours() + (diffDays * 24);
    const endM   = now.getMinutes().toString().padStart(2, '0');
    const dateStr = `${startTime.getDate()}/${startTime.getMonth() + 1}/${startTime.getFullYear().toString().slice(-2)}`;
    const name   = `${dateStr} ${startH}:${startM}-${endH}:${endM}`;

    const all = JSON.parse(localStorage.getItem('f_p') || '{}');
    all[name] = playHistory.map(idx => {
        const t = playlist[idx];
        if (t && t.type === 'youtube') return { yt: true, id: t.id, title: t.title };
        return t ? { n: t.file.name, f: t.folder } : null;
    }).filter(Boolean);

    localStorage.setItem('f_p', JSON.stringify(all));
    renderPlaylists();
    showToast('Cronologia Salvata');
};




// ─── PLAYER ───────────────────────────────────────────────────────────────────
// Dipende da: state.js, utils.js, ui.js, expandedPlayer.js

const audio         = document.getElementById('main-audio');
const seekSlider    = document.getElementById('seek-slider');
const timeCurrent   = document.getElementById('time-current');
const timeTotal     = document.getElementById('time-total');
const nowPlayingTitle = document.getElementById('now-playing-title');
const playBtn       = document.getElementById('btn-play');

// ── Riproduci traccia locale ──────────────────────────────────────────────────
function playTrack(idx, fromQueue = false, isBack = false) {
    if (idx < 0 || idx >= playlist.length) return;
    currentYTId = null;
    if (!isBack && currentPlayingIdx !== -1 && currentPlayingIdx !== idx) {
        playHistory.push(currentPlayingIdx);
    }
    currentPlayingIdx = idx;
    if (!fromQueue) lastManualLibraryIdx = idx;

    const track = playlist[idx];
    audio.src = URL.createObjectURL(track.file);
    audio.play();

    nowPlayingTitle.textContent = track.file.name.replace(/\.[^/.]+$/, '');
    updateUI();
    updateExpandedView(idx);

    if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
            title:   nowPlayingTitle.textContent,
            artist:  track.folder.split('/').pop(),
            artwork: [{ src: track.cover || 'https://placehold.co/512x512', sizes: '512x512', type: 'image/png' }]
        });
        navigator.mediaSession.setActionHandler('previoustrack', () => document.getElementById('btn-prev').click());
        navigator.mediaSession.setActionHandler('nexttrack',     () => document.getElementById('btn-next').click());
        navigator.mediaSession.setActionHandler('play',  () => audio.play());
        navigator.mediaSession.setActionHandler('pause', () => audio.pause());
    }
}

// ── Riproduci item generico (locale o YT) ─────────────────────────────────────
function playItem(item) {
    if (item.type === 'youtube') {
        audio.pause();
        currentYTId = item.id;
        nowPlayingTitle.textContent = item.title;

        document.querySelectorAll('#youtube-results .track-item').forEach(el => {
            const idx = parseInt(el.dataset.ytIdx);
            const v = window.ytResults[idx];
            if (v && v.id === item.id) {
                el.style.borderLeft = '5px solid var(--primary)';
                el.style.background = '#252525';
            } else {
                el.style.borderLeft = '';
                el.style.background = '#1a1a1a';
            }
        });

        if (ytReady && ytPlayer) {
            ytPlayer.loadVideoById(item.id);
        } else {
            ytPendingVideoId = item.id;
        }

        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title:   item.title,
                artist:  item.uploader || 'YouTube',
                artwork: [{ src: item.thumb || '', sizes: '512x512', type: 'image/jpeg' }]
            });
            navigator.mediaSession.setActionHandler('previoustrack', () => document.getElementById('btn-prev').click());
            navigator.mediaSession.setActionHandler('nexttrack',     () => document.getElementById('btn-next').click());
        }

        updateUI();
        return;
    }

    // File locale
    currentYTId = null;
    const idx = playlist.indexOf(item);
    playTrack(idx);
}

// ── Controlli ─────────────────────────────────────────────────────────────────
playBtn.onclick = () => {
    if (ytReady && ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
        const state = ytPlayer.getPlayerState();
        if (state === YT.PlayerState.PLAYING) { ytPlayer.pauseVideo(); return; }
        if (state === YT.PlayerState.PAUSED)  { ytPlayer.playVideo();  return; }
    }
    audio.paused ? audio.play() : audio.pause();
};

document.getElementById('btn-shuffle').onclick = () => {
    isShuffle = !isShuffle;
    if (isShuffle) {
        shuffleOrder = Array.from(Array(playlist.length).keys());
        for (let i = shuffleOrder.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffleOrder[i], shuffleOrder[j]] = [shuffleOrder[j], shuffleOrder[i]];
        }
    }
    if (navigator.vibrate) navigator.vibrate(30);
    updateUI();
};

document.getElementById('btn-loop').onclick = () => { isLooping = !isLooping; updateUI(); };

document.getElementById('btn-next').onclick = () => {
    if (queue.length > 0) {
        const next = queue.shift();
        renderQueue();
        playItem(next);
        return;
    }
    let nextIdx = lastManualLibraryIdx + 1;
    if (isShuffle) nextIdx = Math.floor(Math.random() * playlist.length);
    if (nextIdx < playlist.length) playTrack(nextIdx);
};

document.getElementById('btn-prev').onclick = () => {
    if (audio.currentTime > 3) return (audio.currentTime = 0);
    if (playHistory.length) { playTrack(playHistory.pop(), false, true); return; }
    if (currentPlayingIdx > 0) playTrack(currentPlayingIdx - 1);
};

// ── Audio events ──────────────────────────────────────────────────────────────
audio.onplay  = updateUI;
audio.onpause = updateUI;

audio.onended = () => {
    if (isLooping) { audio.currentTime = 0; audio.play(); }
    else document.getElementById('btn-next').click();
};

audio.ontimeupdate = () => {
    seekSlider.value = (audio.currentTime / audio.duration) * 100 || 0;
    timeCurrent.textContent = formatTime(audio.currentTime);
    if (audio.duration) timeTotal.textContent = formatTime(audio.duration);
};

seekSlider.oninput = () => { audio.currentTime = (seekSlider.value / 100) * audio.duration; };





// ─── LIBRARY ──────────────────────────────────────────────────────────────────
// Dipende da: state.js, utils.js, player.js, queue.js

const libraryEl = document.getElementById('library');
const input     = document.getElementById('folderInput');

let startTime = null;

// ── Caricamento cartella ──────────────────────────────────────────────────────
input.addEventListener('change', async (e) => {
    if (!startTime) startTime = new Date();

    const files = [...e.target.files].filter(f =>
        f.type?.startsWith('audio/') || f.type?.startsWith('video/')
    );

    const newFolders = {};

    files.forEach(f => {
        const parts = (f.webkitRelativePath || f.name).split('/');
        parts.pop();
        const path = parts.join('/') || 'Root';

        if (!newFolders[path]) newFolders[path] = [];
        newFolders[path].push(f);
    });

    for (const path of Object.keys(newFolders).sort()) {
        const group = document.createElement('div');
        group.className = 'folder-group';

        const header = document.createElement('div');
        header.className = 'folder-name';
        header.textContent = `📁 ${path}`;

        const container = document.createElement('div');
        container.style.display = 'block';

        header.addEventListener('click', () => {
            container.style.display =
                container.style.display === 'none' ? 'block' : 'none';
        });

        group.append(header, container);

        for (const file of newFolders[path]) {
            const idx = playlist.length;

            playlist.push({ file, folder: path, cover: null });

            const trackEl = createTrackItem(file, path, idx);
            container.appendChild(trackEl);

            extractCover(file, idx).catch(() => {});
            getDuration(file, idx).catch(() => {});
        }

        libraryEl.appendChild(group);
    }
});

// ── Crea elemento DOM traccia ─────────────────────────────────────────────────
function createTrackItem(file, path, idx) {
    const item = document.createElement('div');
    const ext  = file.name.split('.').pop();

    item.className   = 'track-item';
    item.dataset.idx = idx;

    const cover = document.createElement('div');
    cover.className = 'track-cover';
    cover.id = `cov-${idx}`;
    cover.textContent = '🎵';

    const info = document.createElement('div');
    info.className = 'track-info';

    info.addEventListener('click', () => playTrack(idx));

    info.innerHTML = `
        <span class="track-name">${file.name.replace(/\.[^/.]+$/, '')}</span>
        <div class="track-meta-row">
            <span>${path.split('/').pop()}</span>
            <span class="file-format">${ext}</span>
            <span id="dur-${idx}" style="color:var(--primary);font-weight:bold;">...</span>
        </div>
    `;

    item.append(cover, info);

    setupSwipe(item, idx);

    return item;
}

// ── Estrai cover art ──────────────────────────────────────────────────────────
async function extractCover(file, idx) {
    if (!playlist[idx]) return;

    // VIDEO
    if (file.type.startsWith('video/')) {
        return new Promise((resolve) => {
            const video = document.createElement('video');
            const url   = URL.createObjectURL(file);

            video.src   = url;
            video.muted = true;
            video.playsInline = true;

            video.addEventListener('loadeddata', () => {
                try {
                    video.currentTime = Math.min(1, video.duration || 1);
                } catch {}
            });

            video.addEventListener('seeked', () => {
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = 160;
                    canvas.height = 160;

                    const ctx = canvas.getContext('2d');

                    const size = Math.min(video.videoWidth, video.videoHeight);
                    const x = (video.videoWidth - size) / 2;
                    const y = (video.videoHeight - size) / 2;

                    ctx.drawImage(video, x, y, size, size, 0, 0, 160, 160);

                    const imageUrl = canvas.toDataURL('image/jpeg', 0.7);

                    if (playlist[idx]) {
                        playlist[idx].cover = imageUrl;
                        const el = document.getElementById(`cov-${idx}`);
                        if (el) el.innerHTML = `<img src="${imageUrl}">`;
                    }
                } catch {}

                URL.revokeObjectURL(url);
                video.remove();
                resolve();
            });

            video.addEventListener('error', () => {
                URL.revokeObjectURL(url);
                resolve();
            });
        });
    }

    // AUDIO (ID3)
    if (window.jsmediatags && file.type.startsWith('audio/')) {
        return new Promise((resolve) => {
            jsmediatags.read(file, {
                onSuccess(tag) {
                    try {
                        const pic = tag.tags.picture;
                        if (pic) {
                            const blob = new Blob(
                                [new Uint8Array(pic.data)],
                                { type: pic.format }
                            );

                            const url = URL.createObjectURL(blob);

                            if (playlist[idx]) {
                                playlist[idx].cover = url;
                                const el = document.getElementById(`cov-${idx}`);
                                if (el) el.innerHTML = `<img src="${url}">`;
                            }
                        }
                    } catch {}
                    resolve();
                },
                onError: () => resolve()
            });
        });
    }
}

// ── Leggi durata ──────────────────────────────────────────────────────────────
function getDuration(file, idx) {
    return new Promise((resolve) => {
        const audio = new Audio();
        const url   = URL.createObjectURL(file);

        audio.src = url;

        audio.addEventListener('loadedmetadata', () => {
            try {
                const m = Math.floor(audio.duration / 60);
                const s = Math.floor(audio.duration % 60)
                    .toString()
                    .padStart(2, '0');

                const el = document.getElementById(`dur-${idx}`);
                if (el) el.textContent = `${m}:${s}`;
            } catch {}

            URL.revokeObjectURL(url);
            resolve();
        });

        audio.addEventListener('error', () => {
            URL.revokeObjectURL(url);
            resolve();
        });
    });
}

// ── Swipe su traccia locale ───────────────────────────────────────────────────
function setupSwipe(el, idx) {
    let sX = 0, sY = 0, cX = 0, isSwipe = false;
    const threshold = 50;

    el.addEventListener('touchstart', e => {
        sX = e.touches[0].clientX;
        sY = e.touches[0].clientY;
        isSwipe = false;
        el.style.transition = 'none';
    }, { passive: true });

    el.addEventListener('touchmove', e => {
        let dX = e.touches[0].clientX - sX;
        let dY = e.touches[0].clientY - sY;

        if (!isSwipe) {
            if (Math.abs(dX) > Math.abs(dY) && Math.abs(dX) > 10) {
                isSwipe = true;
            } else if (Math.abs(dY) > 10) {
                return;
            }
        }

        if (isSwipe) {
            e.preventDefault();

            cX = dX * 0.5;
            el.style.transform = `translateX(${cX}px)`;

            const opacity = Math.min(Math.abs(cX) / 100, 0.4);

            el.style.backgroundColor = cX > 0
                ? `rgba(76,175,80,${opacity})`
                : `rgba(33,150,243,${opacity})`;
        }
    }, { passive: false });

    el.addEventListener('touchend', () => {
        el.style.transition = '0.4s cubic-bezier(0.18,0.89,0.32,1.28)';
        el.style.transform = 'translateX(0)';
        el.style.backgroundColor = '';

        if (isSwipe && Math.abs(cX) > threshold) {
            if (navigator.vibrate) navigator.vibrate(30);
            cX > 0 ? addToQ(idx, true) : addToQ(idx, false);
        }

        cX = 0;
    });
}

// ── Queue ─────────────────────────────────────────────────────────────────────
function addToQ(idx, top = true) {
    if (!playlist[idx]) return;

    top ? queue.unshift(playlist[idx]) : queue.push(playlist[idx]);

    renderQueue();
    showToast(top ? 'In cima ↑' : 'In fondo ↓');

    if (navigator.vibrate) navigator.vibrate(30);
}






// ─── YOUTUBE ──────────────────────────────────────────────────────────────────
// Dipende da: config.js, state.js, utils.js, player.js, queue.js

// ── IFrame API callback (chiamata dall'SDK YT) ────────────────────────────────
function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('yt-player', {
        height: '1', width: '1', videoId: '',
        playerVars: { playsinline: 1, autoplay: 0 },
        events: {
            onReady: () => {
                ytReady = true;
                if (ytPendingVideoId) {
                    ytPlayer.loadVideoById(ytPendingVideoId);
                    ytPendingVideoId = null;
                }
            },
            onStateChange: onYTStateChange
        }
    });
}

function onYTStateChange(e) {
    if (e.data === YT.PlayerState.ENDED) {
        document.getElementById('btn-next').click();
    }
    document.getElementById('btn-play').innerHTML =
        (e.data === YT.PlayerState.PLAYING) ? DRAW.pause : DRAW.play;
}

// ── Ricerca YouTube Data API v3 ───────────────────────────────────────────────
let ytSearchDebounce = null;

async function searchYouTube(q) {
    const container = document.getElementById('youtube-results');
    const section   = document.getElementById('yt-section');

    if (!q || q.length < 2) {
        section.style.display = 'none';
        container.innerHTML = '';
        window.ytResults = [];
        return;
    }

    // Skeleton loader
    section.style.display = 'block';
    container.innerHTML = `
        <div class="yt-skeleton">
            ${[0, 1, 2].map(() => `
            <div class="yt-skeleton-item">
                <div class="skel-cover"></div>
                <div class="skel-info">
                    <div class="skel-line"></div>
                    <div class="skel-line short"></div>
                </div>
            </div>`).join('')}
        </div>`;

    try {
        // 1) Search
        const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&type=video&maxResults=3&key=${YT_API_KEY}`;
        const searchRes = await fetch(searchUrl);
        if (!searchRes.ok) throw new Error(await searchRes.text());
        const searchData = await searchRes.json();

        const items = searchData.items || [];
        if (!items.length) {
            container.innerHTML = `<div style="color:var(--text-dim);font-size:0.8rem;padding:10px;">Nessun risultato</div>`;
            return;
        }

        const videoIds = items.map(i => i.id.videoId).join(',');

        // 2) Videos.list (durata)
        const detailUrl  = `https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${videoIds}&key=${YT_API_KEY}`;
        const detailRes  = await fetch(detailUrl, { signal: AbortSignal.timeout(8000) });
        const detailData = detailRes.ok ? await detailRes.json() : { items: [] };

        const durationMap = {};
        (detailData.items || []).forEach(v => {
            durationMap[v.id] = parseISO8601Duration(v.contentDetails.duration);
        });

        window.ytResults = items.map(item => ({
            type:     'youtube',
            id:       item.id.videoId,
            title:    item.snippet.title,
            thumb:    item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || '',
            duration: durationMap[item.id.videoId] || 0,
            uploader: item.snippet.channelTitle || 'YouTube'
        }));

        renderYouTubeResults(window.ytResults);

    } catch (err) {
        console.error('YouTube search error:', err);
        container.innerHTML = `<div style="color:#ff4444;font-size:0.8rem;padding:10px;">Errore: ${err.message}</div>`;
    }
}

// ── Render risultati ──────────────────────────────────────────────────────────
function renderYouTubeResults(results) {
    const container = document.getElementById('youtube-results');
    container.innerHTML = '';
    const n = results.length;

    results.forEach((video, i) => {
        const el = document.createElement('div');
        el.className = 'track-item';
        el.dataset.ytIdx = i;

        el.style.background   = '#1a1a1a';
        el.style.borderBottom = i < n - 1 ? '1px solid #2a2a2a' : 'none';
        el.style.marginBottom = i === n - 1 ? '15px' : '0';
        if      (n === 1)       el.style.borderRadius = '15px';
        else if (i === 0)       el.style.borderRadius = '15px 15px 0 0';
        else if (i === n - 1)   el.style.borderRadius = '0 0 15px 15px';

        const durStr = video.duration ? formatTime(video.duration) : '';

        el.innerHTML = `
            <div class="track-cover">
                <img src="${video.thumb}" alt="" onerror="this.parentElement.innerHTML='▶️'">
            </div>
            <div class="track-info" data-play-yt="${i}">
                <span class="track-name">${escapeHtml(video.title)}</span>
                <div class="track-meta-row">
                    <span>${escapeHtml(video.uploader)}</span>
                    <span class="file-format yt-badge">YT</span>
                    ${durStr ? `<span style="color:var(--primary);font-weight:bold;">${durStr}</span>` : ''}
                </div>
            </div>`;

        el.querySelector('[data-play-yt]').onclick = () => playItem(window.ytResults[i]);

        if (currentYTId && currentYTId === video.id) {
            el.style.borderLeft = '5px solid var(--primary)';
            el.style.background = '#252525';
        }

        setupYTSwipe(el, i);
        container.appendChild(el);
    });
}

// ── Swipe su risultato YT ─────────────────────────────────────────────────────
function setupYTSwipe(el, idx) {
    let sX = 0, sY = 0, cX = 0, isSwipe = false;
    const threshold = 50;

    el.ontouchstart = e => {
        sX = e.touches[0].clientX; sY = e.touches[0].clientY;
        isSwipe = false; el.style.transition = 'none';
    };

    el.ontouchmove = e => {
        let dX = e.touches[0].clientX - sX, dY = e.touches[0].clientY - sY;
        if (!isSwipe) {
            if (Math.abs(dX) > Math.abs(dY) && Math.abs(dX) > 10) isSwipe = true;
            else if (Math.abs(dY) > 10) return;
        }
        if (isSwipe) {
            e.preventDefault();
            cX = dX * 0.5;
            el.style.transform = `translateX(${cX}px)`;
            el.style.backgroundColor = cX > 0
                ? `rgba(76,175,80,${Math.min(Math.abs(cX) / 100, 0.4)})`
                : `rgba(33,150,243,${Math.min(Math.abs(cX) / 100, 0.4)})`;
        }
    };

    el.ontouchend = () => {
        el.style.transition = '0.4s cubic-bezier(0.18,0.89,0.32,1.28)';
        el.style.transform = 'translateX(0)';
        el.style.backgroundColor = '';
        if (isSwipe && Math.abs(cX) > threshold) {
            if (navigator.vibrate) navigator.vibrate(30);
            const video = window.ytResults[idx];
            if (cX > 0) { queue.unshift(video); showToast('In cima ↑'); }
            else         { queue.push(video);    showToast('In fondo ↓'); }
            renderQueue();
        }
        cX = 0;
    };
}





// ─── MAIN ─────────────────────────────────────────────────────────────────────
// Entry point. Dipende da tutti gli altri moduli.

// ── Ricerca con debounce ──────────────────────────────────────────────────────
document.getElementById('search-input').oninput = (e) => {
    const val = e.target.value.toLowerCase();

    // Filtra libreria locale
    document.querySelectorAll('.folder-group').forEach(g => {
        let has = false;
        g.querySelectorAll('.track-item').forEach(tr => {
            const match = tr.textContent.toLowerCase().includes(val);
            tr.style.display = match ? 'flex' : 'none';
            if (match) has = true;
        });
        g.style.display = has ? 'block' : 'none';
    });

    // Debounce ricerca YT
    clearTimeout(ytSearchDebounce);
    ytSearchDebounce = setTimeout(() => searchYouTube(val), 500);
};

// ── Click sul titolo → apre player espanso ────────────────────────────────────
document.getElementById('now-playing-title').onclick = () => togglePlayer(true);

// ── Init ──────────────────────────────────────────────────────────────────────
window.onload = () => {
    updateUI();
    renderPlaylists();
    setupExpandedSwipe();
};
